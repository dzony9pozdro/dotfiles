
[window]
dynamic_padding = true
decorations = "Buttonless"
opacity = 1
blur = false

[window.padding]
x = 10
y = 10

[font]
size = 19

[font.normal]
family = "FiraCode Nerd Font Mono"

[font.bold]
family = "FiraCode Nerd Font Mono"

[font.italic]
family = "FiraCode Nerd Font Mono"

[colors.primary]
background = "#1e1e2e"
foreground = "#ffffff"

[colors.normal]
black = "#1a1a1a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#cba6f7"
cyan = "#94e2d5"
white = "#ffffff"

[colors.bright]
black = "#4a4a4a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#cba6f7"
cyan = "#94e2d5"
white = "#ffffff"

[keyboard]

[[keyboard.bindings]]
key = "S"
mods = "Command"
chars = "\x08"  

[[keyboard.bindings]]

key = "C"
mods = "Command"
action = "Copy"

[[keyboard.bindings]]
key = "V"
mods = "Command"
action = "Paste"

[[keyboard.bindings]]
key = "Q"
mods = "Command"
action = "Quit"

[[keyboard.bindings]]
key = "N"
mods = "Command"
action = "SpawnNewInstance"

[[keyboard.bindings]]
key = "Plus"
mods = "Command"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Command"
action = "DecreaseFontSize"

[general]
import = ["/Users/jan/.config/alacritty/themes/catppuccin_mocha.toml"]
